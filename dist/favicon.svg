<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>
  <!-- Clock face -->
  <circle cx="28" cy="32" r="18" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- Hour ticks at 12, 3, 6, 9 -->
  <line x1="28" y1="15" x2="28" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="45" x2="28" y2="49" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="11" y1="32" x2="15" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="32" x2="45" y2="32" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour hand pointing ~9 -->
  <line x1="28" y1="32" x2="20" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand pointing ~12 -->
  <line x1="28" y1="32" x2="28" y2="20" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="28" cy="32" r="2" fill="#6366f1"/>
  <!-- Clock-in arrow (right side, outside clock) -->
  <line x1="49" y1="32" x2="57" y2="32" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  <polyline points="53,27 58,32 53,37" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
